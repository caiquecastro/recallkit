services:
  db:
    image: pgvector/pgvector:pg16
    container_name: recallkit-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: recallkit
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - recallkit_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d recallkit"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  recallkit_postgres_data:
