name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/recallkit

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.1
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Unit tests with coverage
        run: pnpm test:coverage

      - name: Write coverage comment
        if: github.event_name == 'pull_request'
        run: |
          node <<'NODE'
          const fs = require("node:fs");

          const summary = JSON.parse(
            fs.readFileSync("coverage/coverage-summary.json", "utf8"),
          );
          const total = summary.total;
          const percent = (metric) => `${total[metric].pct}%`;
          const marker = "<!-- recallkit-coverage-report -->";
          const body = `${marker}
          ## Coverage Report

          | Metric | Coverage |
          | --- | ---: |
          | Statements | ${percent("statements")} |
          | Branches | ${percent("branches")} |
          | Functions | ${percent("functions")} |
          | Lines | ${percent("lines")} |

          Generated by \`pnpm test:coverage\`.
          `;

          fs.writeFileSync("coverage-comment.md", body.replace(/^ {10}/gm, ""));
          NODE

      - name: Post coverage comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("node:fs");
            const marker = "<!-- recallkit-coverage-report -->";
            const body = fs.readFileSync("coverage-comment.md", "utf8");
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.data.find((comment) =>
              comment.user.type === "Bot" && comment.body?.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Build
        run: pnpm build
